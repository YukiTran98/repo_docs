<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewer — Repo Docs Hub</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --bg:#f5f4f0; --bg2:#ffffff; --bg3:#eeecea; --bg4:#e4e2de;
  --line:rgba(0,0,0,0.07); --line2:rgba(0,0,0,0.11);
  --text:#1a1917; --text2:#5a5750; --text3:#9a978f;
  --accent:#4e6b9e;
  --accent-bg:rgba(78,107,158,0.09);
  --accent-bd:rgba(78,107,158,0.28);
  --accent2:#3d7a60;
  --accent2-bg:rgba(61,122,96,0.09);
  --accent2-bd:rgba(61,122,96,0.28);
  --mono:'IBM Plex Mono',monospace;
  --sans:'Sora',sans-serif;
  --topbar-h: 52px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;overflow:hidden;}

/* ── Top Bar ── */
.topbar{
  position:fixed;top:0;left:0;right:0;
  height:var(--topbar-h);
  background:var(--bg2);
  border-bottom:1px solid var(--line2);
  display:flex;align-items:center;
  padding:0 20px;
  gap:14px;
  z-index:50;
}
.back-btn{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:7px;
  background:var(--bg3);border:1px solid var(--line2);
  font-family:var(--sans);font-size:12px;font-weight:500;color:var(--text2);
  cursor:pointer;text-decoration:none;
  transition:background 0.1s,color 0.1s;
  flex-shrink:0;
  white-space:nowrap;
}
.back-btn:hover{background:var(--bg4);color:var(--text);}
.back-icon{font-size:13px;}
.topbar-sep{width:1px;height:22px;background:var(--line2);flex-shrink:0;}
.topbar-title{
  font-size:13px;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.topbar-file{
  font-family:var(--mono);font-size:11px;color:var(--text3);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  flex:1;min-width:0;
}
.type-badge{
  font-family:var(--mono);font-size:10px;font-weight:500;
  padding:2px 9px;border-radius:4px;
  white-space:nowrap;flex-shrink:0;margin-left:auto;
}
.type-badge.html{
  background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-bd);
}
.type-badge.functions{
  background:var(--accent2-bg);color:var(--accent2);border:1px solid var(--accent2-bd);
}

/* ── Content area ── */
.content{
  position:fixed;
  top:var(--topbar-h);left:0;right:0;bottom:0;
}

/* ── iframe (HTML doc) ── */
.doc-iframe{
  width:100%;height:100%;border:none;
  background:var(--bg);
}

/* ── Markdown viewer ── */
.md-wrap{
  height:100%;overflow-y:auto;
  background:var(--bg);
}
.md-inner{
  max-width:760px;margin:0 auto;
  padding:40px 28px 80px;
}

/* ── Markdown styles ── */
.md-render h1{
  font-family:var(--sans);font-size:1.5rem;font-weight:600;
  color:var(--text);letter-spacing:-0.03em;
  padding-bottom:10px;border-bottom:1px solid var(--line);
  margin-bottom:16px;
}
.md-render h2{
  font-family:var(--sans);font-size:1.05rem;font-weight:600;
  color:var(--accent);margin:28px 0 10px;letter-spacing:-0.01em;
}
.md-render h3{
  font-family:var(--sans);font-size:0.9rem;font-weight:600;
  color:var(--text);margin:20px 0 8px;
}
.md-render h4{font-size:0.85rem;font-weight:600;margin:16px 0 6px;color:var(--text2);}
.md-render p{color:var(--text2);margin-bottom:12px;line-height:1.75;}
.md-render a{color:var(--accent);text-decoration:none;}
.md-render a:hover{text-decoration:underline;}
.md-render code{
  font-family:var(--mono);font-size:11.5px;
  background:var(--bg3);border:1px solid var(--line);
  padding:1px 6px;border-radius:3px;color:var(--text);
}
.md-render pre{
  background:var(--bg3);border:1px solid var(--line2);
  border-radius:8px;padding:18px;overflow-x:auto;
  margin:4px 0 16px;
}
.md-render pre code{
  background:none;border:none;padding:0;
  font-size:12px;line-height:1.7;color:var(--text);
}
.md-render ul,.md-render ol{padding-left:20px;margin-bottom:12px;}
.md-render li{color:var(--text2);margin-bottom:4px;line-height:1.65;}
.md-render blockquote{
  border-left:3px solid var(--accent-bd);
  padding:8px 14px;margin-bottom:14px;
  background:var(--accent-bg);border-radius:0 6px 6px 0;
}
.md-render blockquote p{color:var(--text2);margin:0;}
.md-render strong{color:var(--text);font-weight:600;}
.md-render hr{border:none;border-top:1px solid var(--line);margin:22px 0;}
.md-render table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:13px;}
.md-render th{
  text-align:left;padding:8px 12px;
  background:var(--bg3);border:1px solid var(--line2);
  font-weight:600;color:var(--text);
}
.md-render td{
  padding:8px 12px;border:1px solid var(--line);
  color:var(--text2);vertical-align:top;
}
.md-render tr:nth-child(even) td{background:var(--bg3);}

/* ── Loading / Error ── */
.state-box{
  max-width:520px;margin:60px auto;text-align:center;
  font-family:var(--mono);font-size:12px;color:var(--text3);
  padding:0 20px;
}
.state-box.error{color:var(--warn,#8a6030);}
.state-box p{margin-top:10px;line-height:1.7;}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <a class="back-btn" id="backBtn" href="home.html">
    <span class="back-icon">←</span> Home
  </a>
  <div class="topbar-sep"></div>
  <div class="topbar-title" id="topTitle">—</div>
  <div class="topbar-file" id="topFile">—</div>
  <div class="type-badge" id="typeBadge">—</div>
</div>

<!-- Content -->
<div class="content" id="contentArea">
  <div class="md-wrap">
    <div class="md-inner">
      <div class="state-box"><p>// loading…</p></div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   PARAMS
   ══════════════════════════════════════════ */
const params = new URLSearchParams(location.search);
const TYPE  = params.get('type') || '';   // 'html' | 'functions'
const FILE  = params.get('file') || '';   // relative path
const TITLE = params.get('title') || FILE;

/* ── Top bar ── */
document.getElementById('topTitle').textContent = TITLE || '—';
document.getElementById('topFile').textContent  = FILE  || '—';

const badge = document.getElementById('typeBadge');
if (TYPE === 'html') {
  badge.textContent = 'HTML Doc';
  badge.className   = 'type-badge html';
} else if (TYPE === 'functions') {
  badge.textContent = 'Functions';
  badge.className   = 'type-badge functions';
} else {
  badge.textContent = TYPE || '—';
}

/* ── Back button: prefer history.back() so browser remembers scroll ── */
document.getElementById('backBtn').addEventListener('click', e => {
  e.preventDefault();
  if (history.length > 1) {
    history.back();
  } else {
    location.href = 'home.html';
  }
});

/* ══════════════════════════════════════════
   RENDER
   ══════════════════════════════════════════ */
const contentArea = document.getElementById('contentArea');

function showError(msg) {
  contentArea.innerHTML = `
    <div class="md-wrap"><div class="md-inner">
      <div class="state-box error">
        <p>${msg}</p>
        <p style="margin-top:16px">
          Tip: mở trang này qua HTTP server, không phải file://<br>
          Chạy: <code>./start.sh</code> hoặc <code>python3 -m http.server 8080</code>
        </p>
      </div>
    </div></div>`;
}

async function renderHTML() {
  if (!FILE) { showError('// Thiếu tham số <b>file</b>'); return; }
  contentArea.innerHTML =
    `<iframe class="doc-iframe" id="docFrame" src="${encodeURI(FILE)}" title="${TITLE}"></iframe>`;
}

async function renderFunctions() {
  if (!FILE) { showError('// Thiếu tham số <b>file</b>'); return; }
  try {
    const res = await fetch(FILE + '?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status + ' — ' + FILE);
    const md = await res.text();
    contentArea.innerHTML = `
      <div class="md-wrap">
        <div class="md-inner">
          <div class="md-render" id="mdOut"></div>
        </div>
      </div>`;
    document.getElementById('mdOut').innerHTML = marked.parse(md);
  } catch (e) {
    showError(`// Không thể tải file: <b>${FILE}</b><br>${e.message}`);
  }
}

/* ══════════════════════════════════════════
   DISPATCH
   ══════════════════════════════════════════ */
if (TYPE === 'html') {
  renderHTML();
} else if (TYPE === 'functions') {
  renderFunctions();
} else {
  showError('// Tham số <b>type</b> không hợp lệ. Dùng: <code>type=html</code> hoặc <code>type=functions</code>');
}
</script>
</body>
</html>
